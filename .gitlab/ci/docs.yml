### DOCS STAGE JOBS ###

docs:
  stage: docs
  extends:
    - .nox
    - .rules_main_mr_docs
  image: ubuntu:24.04
  needs: []
  tags:
    - $DOCS_RUNNER_TAG
  before_script:
    - apt update && apt install curl git graphviz libgl1 -y
    - git fetch --tags  # Ensure version tags are available for setuptools-scm
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - uv tool install nox --with nox-uv
  script:
    - if [ "$CI_COMMIT_BRANCH" != "main" ]; then bash docs/fetch-docs-cache.sh || true; fi
    - uvx nox -P 3.13 -e docs $DOCS_CLEAN
    - bash docs/push-docs-cache.sh
  cache:
    # uv cache, shared with the other .nox jobs (same key derived from uv.lock).
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
    # Notebook datasets downloaded during the docs build. Notebooks (and
    # docs/source/data.py) execute with their working dir set to
    # docs/source/notebooks, so datasets land in docs/source/notebooks/data.
    # Dedicated key so other jobs don't clobber it; keyed on data.py so adding
    # or changing a dataset invalidates the cache.
    - key:
        files:
          - docs/source/data.py
        prefix: docs-datasets
      paths:
        - docs/source/notebooks/data
  artifacts:
    paths:
      - output/docs/html/
    when: always
  variables:
    UV_INSTALL_DIR: /usr/local/bin
    UV_COMPILE_BYTECODE: 1
    UV_NO_PROGRESS: true
    DATAEVAL_NOX_UV_EXTRAS_OVERRIDE: cu128
    GIT_STRATEGY: clone  # Full clone needed for artifact branch operations

doctest:
  stage: docs
  extends:
    - .nox
    - .rules_main_mr_docs
  script:
    - uvx nox -e doctest

linkchecker:
  stage: docs
  extends: .rules_main_mr_docs
  needs: []
  image:
    name: ghcr.io/tcort/markdown-link-check:stable
    entrypoint: ['/bin/sh', '-c']
  script:
    - markdown-link-check --config docs/.markdown-link-check.json *.md
    - markdown-link-check --config docs/.markdown-link-check.json ./docs/source
  # Allow failures in link checking to avoid blocking merges due to transient issues
  # and anti-scraping measures on some sites. Warnings should be reviewed and addressed.
  allow_failure: true

markdownlint:
  stage: docs
  extends: .rules_main_mr_docs
  needs: []
  image:
    name: davidanson/markdownlint-cli2
    entrypoint: ['']
  script: |
    markdownlint-cli2 README.md || FAIL=1
    markdownlint-cli2 CONTRIBUTING.md || FAIL=1
    markdownlint-cli2 'docs/**/*.md' '#node_modules' || FAIL=1
    exit $FAIL
